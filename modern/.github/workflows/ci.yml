name: CI
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Python syntax
        run: python -m py_compile modern/backend/*.py
      - name: Run tests
        run: |
          python -m pip install -r modern/backend/requirements_full.txt
          pytest -q
