server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: liferpg
    static_configs:
      - targets:
          - localhost
        labels:
          job: liferpg
          host: ${HOSTNAME}
          __path__: /var/log/liferpg/*.log
  - job_name: liferpg-stdout
    static_configs:
      - targets:
          - localhost
        labels:
          job: liferpg
          host: ${HOSTNAME}
          __path__: /var/lib/docker/containers/*/*-json.log
